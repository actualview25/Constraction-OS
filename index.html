<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ACTUAL CONSTRUCTION OS - منصة إدارة المشاريع الهندسية</title>
    
    <!-- ===== تصحيح المسارات الأساسي ===== -->
    <script>
        (function fixBasePaths() {
            console.log('🔧 بدء تصحيح المسارات الأساسية...');
            
            // تصحيح اسم المستودع (Constraction → Construction)
            const wrongBase = 'Constraction-OS/';
            const correctBase = 'Construction-OS/';
            
            // تصحيح حالة الأحرف (modules → Modules)
            const wrongModules = '/Construction-OS/modules/';
            const correctModules = '/Construction-OS/Modules/';
            
            // اعتراض جميع طلبات fetch
            const originalFetch = window.fetch;
            window.fetch = function(url, options) {
                if (typeof url === 'string') {
                    let fixedUrl = url;
                    
                    // تصحيح اسم المستودع
                    if (fixedUrl.includes(wrongBase)) {
                        fixedUrl = fixedUrl.replace(wrongBase, correctBase);
                        console.log('📁 تم تصحيح المستودع:', fixedUrl);
                    }
                    
                    // تصحيح modules → Modules
                    if (fixedUrl.includes(wrongModules)) {
                        fixedUrl = fixedUrl.replace(wrongModules, correctModules);
                        console.log('📁 تم تصحيح Modules:', fixedUrl);
                    }
                    
                    if (fixedUrl !== url) {
                        return originalFetch.call(this, fixedUrl, options);
                    }
                }
                return originalFetch.call(this, url, options);
            };
            
            // اعتراض import الديناميكي
            const originalImport = window.import;
            if (originalImport) {
                window.import = function(url) {
                    if (typeof url === 'string') {
                        let fixedUrl = url;
                        if (fixedUrl.includes(wrongBase)) {
                            fixedUrl = fixedUrl.replace(wrongBase, correctBase);
                        }
                        if (fixedUrl.includes(wrongModules)) {
                            fixedUrl = fixedUrl.replace(wrongModules, correctModules);
                        }
                        return originalImport.call(this, fixedUrl);
                    }
                    return originalImport.call(this, url);
                };
            }
            
            console.log('✅ نظام تصحيح المسارات جاهز');
        })();
    </script>
    
    <!-- ربط ملف CSS -->
    <link rel="stylesheet" href="style.css">
    
    <!-- أيقونة الموقع -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🏗️</text></svg>">
    
    <!-- وصف الموقع لمحركات البحث -->
    <meta name="description" content="منصة متكاملة لتصميم وإدارة المشاريع الهندسية - ACTUAL CONSTRUCTION OS">
    <meta name="keywords" content="هندسة, بناء, مشاريع, خرسانة, حديد, تشطيبات">
    <meta name="author" content="مهندس سوداني">
    
    <!-- دعم اللغة العربية -->
    <meta name="language" content="ar">
    
    <!-- ألوان الواجهة للمتصفحات الحديثة -->
    <meta name="theme-color" content="#111122">
    
    <!-- إعدادات Three.js -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>
    
    <style>
        /* أنماط أساسية */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #111122;
        }
        
        #container {
            width: 100vw;
            height: 100vh;
            position: fixed;
            top: 0;
            left: 0;
        }
        
        /* شاشة التحميل */
        #loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #111122;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10000;
            transition: opacity 0.5s;
            pointer-events: none;
        }
        
        .loader {
            text-align: center;
            color: white;
        }
        
        .loader h1 {
            color: #88aaff;
            margin-bottom: 20px;
            font-size: 2.5em;
            animation: glow 2s infinite;
        }
        
        .loader p {
            color: #4a6c8f;
            animation: pulse 1.5s infinite;
        }
        
        /* شريط الحالة */
        .status-bar {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: rgba(20, 30, 40, 0.8);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            color: white;
            padding: 8px 16px;
            border-radius: 30px;
            font-size: 12px;
            border: 1px solid #4a6c8f;
            z-index: 900;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        
        /* شريط الأدوات العلوي */
        .main-toolbar {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(20, 30, 40, 0.9);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid #4a6c8f;
            border-radius: 50px;
            padding: 8px 16px;
            display: flex;
            gap: 8px;
            z-index: 1000;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }
        
        .toolbar-btn {
            background: none;
            border: none;
            color: white;
            font-size: 20px;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .toolbar-btn:hover {
            background: rgba(74, 108, 143, 0.5);
            transform: scale(1.1);
        }
        
        .toolbar-btn.active {
            background: #4a6c8f;
            box-shadow: 0 0 15px #88aaff;
        }
        
        /* لوحة التحكم الجانبية */
        #control-panel {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(20, 30, 40, 0.9);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            color: white;
            padding: 20px;
            border-radius: 12px;
            border: 1px solid #4a6c8f;
            z-index: 1000;
            width: 280px;
            direction: rtl;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        }
        
        .panel-header {
            margin-bottom: 15px;
            border-bottom: 1px solid #4a6c8f;
            padding-bottom: 10px;
        }
        
        .panel-header h2 {
            color: #88aaff;
            margin: 0;
            font-size: 18px;
        }
        
        .panel-section {
            margin-bottom: 20px;
        }
        
        .panel-section h3 {
            color: #aaa;
            font-size: 14px;
            margin-bottom: 10px;
        }
        
        /* لوحة الخصائص */
        .properties-panel {
            position: fixed;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            width: 280px;
            background: rgba(20, 30, 40, 0.9);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid #4a6c8f;
            border-radius: 12px;
            color: white;
            z-index: 1000;
            padding: 15px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        }
        
        .properties-panel h3 {
            color: #88aaff;
            margin: 0 0 15px 0;
            font-size: 16px;
            text-align: center;
        }
        
        .property-item {
            margin-bottom: 10px;
            padding: 8px;
            background: #1a2a3a;
            border-radius: 4px;
        }
        
        .property-label {
            color: #aaa;
            font-size: 11px;
        }
        
        .property-value {
            color: white;
            font-size: 14px;
        }
        
        /* أزرار */
        .btn {
            background: #4a6c8f;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 14px;
        }
        
        .btn:hover {
            background: #5a7c9f;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }
        
        /* تحسينات الجوال */
        @media (max-width: 768px) {
            .main-toolbar {
                width: 90%;
                overflow-x: auto;
                justify-content: flex-start;
            }
            
            #control-panel {
                width: 90%;
                right: 5%;
            }
            
            .properties-panel {
                width: 90%;
                right: 5%;
                top: auto;
                bottom: 80px;
                transform: none;
            }
        }
        
        @keyframes pulse {
            0% { opacity: 0.6; }
            50% { opacity: 1; }
            100% { opacity: 0.6; }
        }
        
        @keyframes glow {
            0% { text-shadow: 0 0 10px #88aaff; }
            50% { text-shadow: 0 0 30px #88aaff; }
            100% { text-shadow: 0 0 10px #88aaff; }
        }
    </style>
</head>
<body>
    <!-- شاشة التحميل -->
    <div id="loading">
        <div class="loader">
            <h1>🏗️ ACTUAL CONSTRUCTION OS</h1>
            <p>جاري تحميل المنصة المتكاملة...</p>
            <p style="font-size: 12px; margin-top: 20px;">الإصدار 3.0 | منصة إدارة المشاريع الهندسية</p>
        </div>
    </div>
    
    <!-- حاوية المشهد ثلاثي الأبعاد -->
    <div id="container"></div>
    
    <!-- شريط الحالة -->
    <div class="status-bar" id="statusBar">
        ⏳ جاري التحميل...
    </div>
    
    <!-- شريط الأدوات العلوي -->
    <div class="main-toolbar" id="mainToolbar">
        <button class="toolbar-btn" onclick="window.createWall()" title="إضافة جدار">🧱</button>
        <button class="toolbar-btn" onclick="window.createDoor()" title="إضافة باب">🚪</button>
        <button class="toolbar-btn" onclick="window.createWindow()" title="إضافة شباك">🪟</button>
        <button class="toolbar-btn" onclick="window.createColumn()" title="إضافة عمود">🏛️</button>
        <button class="toolbar-btn" onclick="window.createBeam()" title="إضافة كمرة">📐</button>
        <button class="toolbar-btn" onclick="window.createSlab()" title="إضافة سقف">🏢</button>
        <button class="toolbar-btn" onclick="window.importImage()" title="استيراد صورة 360">📷</button>
        <button class="toolbar-btn" onclick="window.showBOQ()" title="جدول الكميات">📊</button>
        <button class="toolbar-btn" onclick="window.resetCamera()" title="إعادة ضبط الكاميرا">🎯</button>
    </div>
    
    <!-- لوحة الخصائص -->
    <div class="properties-panel" id="propertiesPanel">
        <h3>📋 الخصائص</h3>
        <div id="propertiesContent">
            <p style="color: #aaa; text-align: center;">اختر عنصراً لعرض خصائصه</p>
        </div>
    </div>
    
    <!-- إخفاء شاشة التحميل بعد تحميل الصفحة -->
    <script>
        // تحديث شريط الحالة
        window.updateStatus = function(message, type = 'info') {
            const bar = document.getElementById('statusBar');
            if (bar) {
                const icons = {
                    info: 'ℹ️',
                    success: '✅',
                    warning: '⚠️',
                    error: '❌'
                };
                bar.innerHTML = `${icons[type] || 'ℹ️'} ${message}`;
                
                // العودة للحالة الافتراضية بعد 5 ثوان
                setTimeout(() => {
                    bar.innerHTML = '✅ النظام جاهز';
                }, 5000);
            }
        };
        
        // إخفاء شاشة التحميل
        window.addEventListener('load', () => {
            setTimeout(() => {
                const loading = document.getElementById('loading');
                if (loading) {
                    loading.style.opacity = '0';
                    setTimeout(() => {
                        loading.style.display = 'none';
                    }, 500);
                }
                window.updateStatus('✅ النظام جاهز', 'success');
            }, 2500);
        });
        
        // معالج الأخطاء العام
        window.addEventListener('error', (e) => {
            console.error('خطأ في التحميل:', e.message);
            window.updateStatus('⚠️ خطأ في تحميل بعض الملفات', 'warning');
        }, true);
        
        // دوال مساعدة للواجهة (سيتم استبدالها من main.js)
        window.createWall = () => window.updateStatus('جاري تحميل النظام...', 'info');
        window.createDoor = () => window.updateStatus('جاري تحميل النظام...', 'info');
        window.createWindow = () => window.updateStatus('جاري تحميل النظام...', 'info');
        window.createColumn = () => window.updateStatus('جاري تحميل النظام...', 'info');
        window.createBeam = () => window.updateStatus('جاري تحميل النظام...', 'info');
        window.createSlab = () => window.updateStatus('جاري تحميل النظام...', 'info');
        window.importImage = () => window.updateStatus('جاري تحميل النظام...', 'info');
        window.showBOQ = () => window.updateStatus('جاري تحميل النظام...', 'info');
        window.resetCamera = () => window.updateStatus('جاري تحميل النظام...', 'info');
    </script>
    
    <!-- استيراد الملف الرئيسي (يجب أن يكون في النهاية) -->
    <script type="module" src="./main.js"></script>
</body>
</html>
