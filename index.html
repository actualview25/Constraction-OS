<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ACTUAL CONSTRUCTION OS - منصة إدارة المشاريع الهندسية</title>
    
    <!-- ===== تصحيح المسارات المتقدم ===== -->
    <script>
        (function fixAllPaths() {
            console.log('🔧 بدء تشخيص وتصحيح المسارات...');
            
            // 1. تصحيح اسم المستودع (Constraction → Construction)
            const wrongBase = 'Constraction-OS/';
            const correctBase = 'Construction-OS/';
            
            // 2. تصحيح حالة الأحرف (modules → Modules)
            const wrongModules = '/Construction-OS/modules/';
            const correctModules = '/Construction-OS/Modules/';
            
            // اعتراض جميع طلبات fetch
            const originalFetch = window.fetch;
            window.fetch = function(url, options) {
                if (typeof url === 'string') {
                    let fixedUrl = url;
                    
                    // تصحيح اسم المستودع
                    if (fixedUrl.includes(wrongBase)) {
                        fixedUrl = fixedUrl.replace(wrongBase, correctBase);
                        console.log('📁 تصحيح المستودع:', fixedUrl);
                    }
                    
                    // تصحيح modules → Modules (الأهم!)
                    if (fixedUrl.includes(wrongModules)) {
                        fixedUrl = fixedUrl.replace(wrongModules, correctModules);
                        console.log('📁 تصحيح Modules:', fixedUrl);
                    }
                    
                    if (fixedUrl !== url) {
                        return originalFetch.call(this, fixedUrl, options);
                    }
                }
                return originalFetch.call(this, url, options);
            };
            
            // اعتراض import الديناميكي
            const originalImport = window.import;
            if (originalImport) {
                window.import = function(url) {
                    if (typeof url === 'string') {
                        let fixedUrl = url;
                        if (fixedUrl.includes(wrongBase)) {
                            fixedUrl = fixedUrl.replace(wrongBase, correctBase);
                        }
                        if (fixedUrl.includes(wrongModules)) {
                            fixedUrl = fixedUrl.replace(wrongModules, correctModules);
                        }
                        return originalImport.call(this, fixedUrl);
                    }
                    return originalImport.call(this, url);
                };
            }
            
            // إخفاء أخطاء 404 غير المهمة
            window.addEventListener('error', function(e) {
                // أخطاء الملفات غير الأساسية
                const nonCriticalPaths = [
                    '/player/',
                    '/floors/',
                    '/clash/',
                    '/global/GlobalElectrical.js',
                    '/global/GlobalPlumbing.js',
                    '/global/GlobalHVAC.js'
                ];
                
                if (e.target && e.target.src) {
                    if (nonCriticalPaths.some(path => e.target.src.includes(path))) {
                        e.preventDefault();
                        e.stopPropagation();
                        console.warn('⚠️ تم تجاهل ملف غير أساسي:', e.target.src);
                        return false;
                    }
                }
            }, true);
            
            // تشخيص المسارات
            window.checkPath = async function(path) {
                try {
                    const res = await fetch(path);
                    console.log(`🔍 ${path}: ${res.status} ${res.statusText}`);
                    return res.ok;
                } catch (e) {
                    console.error(`❌ ${path}:`, e.message);
                    return false;
                }
            };
            
            console.log('✅ نظام تصحيح المسارات جاهز');
            console.log('📝 استخدم window.checkPath("/path/to/file.js") للتشخيص');
        })();
    </script>
    
    <!-- ربط ملف CSS -->
    <link rel="stylesheet" href="style.css">
    
    <!-- أيقونة الموقع -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🏗️</text></svg>">
    
    <!-- إعدادات Three.js -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #111122;
        }
        
        #container {
            width: 100vw;
            height: 100vh;
        }
        
        #loading {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: #111122;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10000;
            transition: opacity 0.5s;
        }
        
        .loader {
            text-align: center;
            color: white;
        }
        
        .loader h1 {
            color: #88aaff;
            margin-bottom: 20px;
            font-size: 2.5em;
            animation: glow 2s infinite;
        }
        
        .loader p {
            color: #4a6c8f;
            animation: pulse 1.5s infinite;
        }
        
        .status-bar {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: rgba(20, 30, 40, 0.6);
            backdrop-filter: blur(5px);
            color: white;
            padding: 8px 16px;
            border-radius: 30px;
            font-size: 12px;
            border: 1px solid #4a6c8f;
            z-index: 900;
        }
        
        @keyframes pulse {
            0% { opacity: 0.6; }
            50% { opacity: 1; }
            100% { opacity: 0.6; }
        }
        
        @keyframes glow {
            0% { text-shadow: 0 0 10px #88aaff; }
            50% { text-shadow: 0 0 30px #88aaff; }
            100% { text-shadow: 0 0 10px #88aaff; }
        }
    </style>
</head>
<body>
    <!-- شاشة التحميل -->
    <div id="loading">
        <div class="loader">
            <h1>🏗️ ACTUAL CONSTRUCTION OS</h1>
            <p>جاري تحميل المنصة المتكاملة...</p>
            <p style="font-size: 12px; margin-top: 20px;">الإصدار 3.0 | منصة إدارة المشاريع الهندسية</p>
        </div>
    </div>
    
    <!-- حاوية المشهد ثلاثي الأبعاد -->
    <div id="container"></div>
    
    <!-- شريط الحالة -->
    <div class="status-bar" id="statusBar">
        ⏳ جاري التحميل...
    </div>
    
    <script>
        // تحديث شريط الحالة
        window.updateStatus = function(message, type = 'info') {
            const bar = document.getElementById('statusBar');
            if (bar) {
                const icons = {
                    info: 'ℹ️',
                    success: '✅',
                    warning: '⚠️',
                    error: '❌'
                };
                bar.innerHTML = `${icons[type] || 'ℹ️'} ${message}`;
            }
        };
        
        // إخفاء شاشة التحميل بعد تحميل الصفحة
        window.addEventListener('load', () => {
            setTimeout(() => {
                document.getElementById('loading').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('loading').style.display = 'none';
                }, 500);
            }, 2000);
        });
        
        // تشخيص سريع بعد 3 ثوان
        setTimeout(() => {
            console.log('🔍 تشخيص سريع للمسارات:');
            checkPath('/Construction-OS/Modules/Architecture/Wall.js');
            checkPath('/Construction-OS/Modules/Architecture/Door.js');
        }, 3000);
    </script>
    
    <!-- استيراد الملف الرئيسي -->
    <script type="module" src="./main.js"></script>
</body>
</html>
